<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>動動手30秒參加抽獎</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LIFF 載入畫面 -->
<div id="liff-loading">
  <div style="font-size:2.5rem">🐟</div>
  <div class="spinner"></div>
  <span>載入中…</span>
</div>

<!-- Header -->
<div class="header-banner">
  <img class="header-img" src="banner.png" alt="幸福鱸魚 × 光田醫院">
  <div class="header-title">填寫30秒，送您精美好禮 🎁</div>
  <div class="header-sub">填寫以下資料即可參加抽獎，幸福鱸魚誠摯邀請您</div>
</div>

<!-- 主內容 -->
<div class="main-wrap">

  <!-- LINE 用戶列 -->
  <div id="top-user-bar">
    <div id="top-avatar-wrap"><div class="top-avatar-placeholder">👤</div></div>
    <div class="top-user-info">
      <div class="top-greeting">Hi，</div>
      <div class="top-name" id="top-name">LINE 用戶</div>
    </div>
    <div class="top-line-badge">✅ LINE 已驗證</div>
  </div>

  <!-- 表單區塊 -->
  <div id="form-section">
    <div class="form-card">
      <div class="form-card-title">問卷內容</div>

      <!-- Q1：知道鱸魚 -->
      <fieldset class="q-block" data-q="q1">
        <legend>Q1. 知道鱸魚如何幫助胸口悶之苦？ <span class="req">*</span></legend>
        <label class="opt">
          <input type="radio" name="q1" value="知道" data-tag="知道">
          <span class="opt-mark"></span><span class="opt-text">知道</span>
        </label>
        <label class="opt">
          <input type="radio" name="q1" value="不知道" data-tag="不知道">
          <span class="opt-mark"></span><span class="opt-text">不知道</span>
        </label>
      </fieldset>

      <!-- Q2：小孩年齡 -->
      <fieldset class="q-block" data-q="q2">
        <legend>Q2. 小孩的年齡 <span class="req">*</span></legend>
        <label class="opt">
          <input type="radio" name="q2" value="小於3歲" data-tag="小孩小於3歲">
          <span class="opt-mark"></span><span class="opt-text">小於3歲</span>
        </label>
        <label class="opt">
          <input type="radio" name="q2" value="幼稚園" data-tag="小孩幼稚園">
          <span class="opt-mark"></span><span class="opt-text">幼稚園</span>
        </label>
        <label class="opt">
          <input type="radio" name="q2" value="國小" data-tag="小孩國小">
          <span class="opt-mark"></span><span class="opt-text">國小</span>
        </label>
        <label class="opt">
          <input type="radio" name="q2" value="國高中" data-tag="小孩國高中">
          <span class="opt-mark"></span><span class="opt-text">國高中</span>
        </label>
        <label class="opt">
          <input type="radio" name="q2" value="成人" data-tag="小孩成人">
          <span class="opt-mark"></span><span class="opt-text">成人</span>
        </label>
        <label class="opt">
          <input type="radio" name="q2" value="無" data-tag="">
          <span class="opt-mark"></span><span class="opt-text">無</span>
        </label>
      </fieldset>

      <!-- Q3：健康狀況（複選） -->
      <fieldset class="q-block multi" data-q="q3">
        <legend>Q3. 會在意孩子或自己是否有以下情形？（可複選）<span class="req">*</span></legend>
        <label class="opt">
          <input type="checkbox" name="q3" value="常感冒/免疫力差" data-tag="免疫">
          <span class="opt-mark"></span><span class="opt-text">常感冒／免疫力差</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q3" value="腸胃敏感/易脹氣便祕" data-tag="腸胃道保養">
          <span class="opt-mark"></span><span class="opt-text">腸胃敏感／易脹氣便祕</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q3" value="睡不好/成長期情緒波動" data-tag="睡眠障礙">
          <span class="opt-mark"></span><span class="opt-text">睡不好／成長期情緒波動</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q3" value="關節卡卡/長期挑嘴" data-tag="關節保養">
          <span class="opt-mark"></span><span class="opt-text">關節卡卡／長期挑嘴</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q3" value="無明顯不適，想注重保健" data-tag="注重健康">
          <span class="opt-mark"></span><span class="opt-text">無明顯不適，想注重保健</span>
        </label>
      </fieldset>

      <!-- Q4：過敏體質（複選） -->
      <fieldset class="q-block multi" data-q="q4">
        <legend>Q4. 有沒有以下過敏或體質狀況？（可複選）<span class="req">*</span></legend>
        <label class="opt">
          <input type="checkbox" name="q4" value="對海鮮或魚類過敏" data-tag="海鮮過敏">
          <span class="opt-mark"></span><span class="opt-text">對海鮮或魚類過敏</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q4" value="濕疹、異位性皮膚炎" data-tag="過敏肌">
          <span class="opt-mark"></span><span class="opt-text">濕疹、異位性皮膚炎</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q4" value="鼻子過敏/氣喘" data-tag="鼻子過敏">
          <span class="opt-mark"></span><span class="opt-text">鼻子過敏／氣喘</span>
        </label>
        <label class="opt">
          <input type="checkbox" name="q4" value="無過敏體質" data-tag="">
          <span class="opt-mark"></span><span class="opt-text">無過敏體質</span>
        </label>
      </fieldset>

      <!-- 姓名 -->
      <div class="field">
        <label for="f-name">姓名 <span class="req">*</span></label>
        <input id="f-name" type="text" placeholder="請輸入您的姓名" maxlength="30">
      </div>

      <!-- 電話 -->
      <div class="field">
        <label for="f-phone">電話 <span class="req">*</span></label>
        <input id="f-phone" type="tel" placeholder="09XX-XXX-XXX" maxlength="20">
      </div>

      <!-- 生日月份 -->
      <div class="field">
        <label for="f-birth-month">生日（月份）<span class="req">*</span></label>
        <select id="f-birth-month">
          <option value="">請選擇月份</option>
          <option value="一月">一月</option>
          <option value="二月">二月</option>
          <option value="三月">三月</option>
          <option value="四月">四月</option>
          <option value="五月">五月</option>
          <option value="六月">六月</option>
          <option value="七月">七月</option>
          <option value="八月">八月</option>
          <option value="九月">九月</option>
          <option value="十月">十月</option>
          <option value="十一月">十一月</option>
          <option value="十二月">十二月</option>
        </select>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="submitForm()">送出資料 🎁</button>
    <div class="error-msg" id="form-error"></div>

    <p class="privacy-note">
      本問卷資料僅供活動主辦單位使用，不會對外公開或轉售。<br>
      填寫即代表您同意主辦單位依相關法規使用您的個人資料。
    </p>
  </div>

  <!-- 感謝頁 -->
  <div id="thank-you">
    <div class="ty-card">
      <div class="ty-icon">🎉</div>
      <div class="ty-title">感謝您的填寫！</div>
      <div class="ty-msg">
        親愛的 <strong id="ty-name"></strong>，<br>
        您的資料已成功送出。
      </div>
    </div>
  </div>

</div><!-- /.main-wrap -->

<!-- 送出遮罩 -->
<div class="submit-overlay" id="overlay">
  <div class="spinner"></div>
  <span>送出中，請稍候…</span>
</div>

<script src="app.js"></script>
</body>
</html>
